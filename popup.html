<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mindful Words</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- 标题区域 - 苹果风格设计 -->
  <header class="header">
    <div class="header-content">
      <!-- <div class="app-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
      </div> -->
      
      <h1 class="header-title">Mindful Words</h1>
      <!-- <p class="header-subtitle">Ctrl选中文本即可保存</p> -->
      <p class="header-subtitle">are seeds, action makes them grow. Try, fail, learn, then you'll truly know.</p>
    </div>
      
    <div class="header-toolbar">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="搜索笔记..." />
        <button id="clear-search" title="清除搜索">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      
      <div class="header-actions">
        <button id="export-btn" title="导出笔记">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button id="settings-btn" title="设置">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="black"  stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>
  
  <!-- 笔记列表区域 -->
  <div class="notes-container">
    <div class="fade-edge fade-top"></div>
    <div class="notes-list" id="notes-list">
      <!-- 笔记列表将通过JavaScript动态加载 -->
    </div>
    <div class="fade-edge fade-bottom"></div>
  </div>

  <!-- 编辑模态框 -->
  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑笔记</h3>
        <button id="close-modal" class="close-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="edit-content">内容:</label>
          <textarea id="edit-content" rows="6" placeholder="输入笔记内容..."></textarea>
        </div>
        <div class="form-group">
          <label for="edit-note">个人笔记:</label>
          <textarea id="edit-note" rows="3" placeholder="添加你的想法或备注..."></textarea>
        </div>
        <div class="form-group">
          <label for="edit-tags">标签:</label>
          <input type="text" id="edit-tags" placeholder="输入标签，用逗号分隔..." />
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancel-edit" class="btn-secondary">取消</button>
        <button id="save-edit" class="btn-primary">保存</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
